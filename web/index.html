<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Les Chroniques de Ragnard le Barbare</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%23200e03'/%3E%3Ctext x='50%25' y='52%25' font-size='44' text-anchor='middle' dominant-baseline='middle' fill='%23c49a24'%3E%E2%9A%94%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>

    <!-- ═══ COUVERTURE ═══ -->
    <div id="view-cover" class="view">
      <div class="cover-scene">
        <div class="cover-spine"></div>
        <div class="cover-face">
          <div class="cover-ornament">✦ ✦ ✦</div>
          <p class="cover-kicker">Chroniques Vivantes</p>
          <div class="cover-inner">
            <h1 class="cover-title" id="cover-title">Les Chroniques de Ragnard</h1>
            <div class="cover-rule"></div>
            <p class="cover-subtitle">le Barbare</p>
          </div>
          <div class="cover-sword">⚔</div>
          <div class="cover-ornament">✦ ✦ ✦</div>
          <button id="open-btn" type="button" disabled>Chargement…</button>
        </div>
      </div>
    </div>

    <!-- ═══ LIVRE ═══ -->
    <div id="view-book" class="view hidden">
      <div class="book-wrapper">
        <div id="book-flip" class="book-flip"></div>
        <nav class="book-nav">
          <button id="prev-btn" type="button" aria-label="Page précédente">‹ Précédent</button>
          <span id="nav-info">— / —</span>
          <button id="next-btn" type="button" aria-label="Page suivante">Suivant ›</button>
          <button id="zoom-out-btn" type="button" class="zoom-btn" aria-label="Diminuer le zoom" disabled>Zoom −</button>
          <button id="zoom-in-btn" type="button" class="zoom-btn" aria-label="Augmenter le zoom">Zoom +</button>
          <button id="close-btn" type="button" class="close-btn" aria-label="Refermer">Refermer</button>
        </nav>
      </div>
    </div>

    <!-- Conteneur de mesure pour la pagination (hors-écran) -->
    <div id="measure" aria-hidden="true">
      <div class="page measure-page">
        <div class="page-header"></div>
        <div class="page-content"></div>
        <div class="page-footer"><span class="page-number">— 0 —</span></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <script src="app.js?v=2"></script>
  </body>
</html>
